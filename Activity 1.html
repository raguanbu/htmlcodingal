<!DOCTYPE html>
<html>
    <head>
        <style>
             div { right: 40px;
                    border: 3px solid #73AD21;    
                 }
            div.absolute
                 { position: absolute;
                    left: 50px;
                    border: 3px solid blue;
                 }
                 div.relative
                 { position: relative;
                    left: 100px;
                    border: 3px solid black;
                 }
                 div.fixed
                 { position: fixed;
                    top: 0px;
                    right: 30px;
                    width: 10px;
                    border: 3px solid blue;
                 }
                 div.sticky
                 {position: sticky;
                    top: 100px;
                    left: 30px;
                    width: 10px;
                    border: 3px solid blue
                 }
        </style>
    </head> 
    <body>
        <h2>Positioning</h2>
        <div>
            Div with no position property
        </div>
        <div class="sticky">
            Div with sticky position property
        </div>
         <div class="relative">
            Div with relative position property
        </div>
         <div class="absolute">
            Div with absolute position property
        </div>

    </body>
</html>
