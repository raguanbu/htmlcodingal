<!DOCTYPE html>
<html>
    <head>
        <style>
            div {
                background-color: yellow;
                padding: 10px;
            }
             div.first {
                opacity: 0.1;
             }
             div.second {
                opacity: 0.4;
             }
              div.third {
                opacity: 0.6;
             }
        </style>
    </head>
    <body>
        <h1> THE OPACITY PROPERTY</h1>
    <p>This is how property looks:</p>
     <div class="first" <p> opacity 0.1</p></div>
      <div class="second" <p> opacity 0.4</p></div>
      <div class="second" <p> opacity 0.4</p></div>
<div><p> opacity 1 (default)</p></div> 
    </body>
</html>
