<!DOCTYPE HTML>
<html lang="en">
<head>
<title>lists</title>
</head>
<body>
<h2>An ordered html list:</h2>
<ol>
    <li>First item</li>
    <li>Second item</li>
    <li>Third item</li>
    <li>Fourth item</li>
</ol>
<h2>An unordered html list:</h2>
<ul>
    <li> item</li>
    <li> item</li>
    <li> item</li>
    <li> item</li>
</ul>
<h2>definition list</h2>
<dl>
    <dt>jkju</dt>
    <dd>bgnhn</dd>
</dl>

</body>
</html>
