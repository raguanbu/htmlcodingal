<!DOCTYPE html>
<html lang="en">
    <head>
        <title>CSS Styling Examples</title>
        <style>
        h2{color:green
        }     
        </style>
        <link rel="stylesheet" href="style.css"
    </head>
    <body>
        <hr>
        <h1 style="color:red;"INLINE CSS EXAMPLE</h1>

    </body>
</html>
